{% extends 'base.html' %} {% block content %}
<section class="section-header">
  <h1>Editar leitura</h1>
  <p>Atualize os valores da leitura selecionada.</p>
</section>

<section class="form-card">
  <form
    id="edit-reading-form"
    action="{{ url_for('editar', id=leitura.id) }}"
    method="post"
    data-id="{{ leitura.id }}"
  >
    <label for="temperatura">Temperatura (°C)</label>
    <input
      type="number"
      step="0.1"
      name="temperatura"
      id="temperatura"
      value="{{ leitura.temperatura }}"
      required
    />

    <label for="umidade">Umidade (%)</label>
    <input
      type="number"
      step="0.1"
      name="umidade"
      id="umidade"
      value="{{ leitura.umidade }}"
      required
    />

    <label for="pressao">Pressão (hPa)</label>
    <input
      type="number"
      step="0.1"
      name="pressao"
      id="pressao"
      value="{{ leitura.pressao or '' }}"
    />

    <div class="button-group">
      <button type="submit">Salvar alterações</button>
      <a class="secondary-button" href="{{ url_for('historico') }}">Voltar</a>
    </div>
  </form>
</section>
{% endblock %}
